<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyDeploy</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .sidebar-item { transition: all .15s; }
  .sidebar-item:hover { background: #f1f5f9; }
  .sidebar-item.active { background: #f0fdf4; color: #15803d; border-left: 2px solid #16a34a; }
  .action-btn { transition: all .15s; }
  .action-btn:hover { background: #f1f5f9; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .toast { transition: all .3s; }
  [x-cloak] { display: none; }
  .svc-card { transition: box-shadow .15s; }
  .svc-card:hover { box-shadow: 0 1px 8px rgba(0,0,0,.07); }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-bg { background: rgba(0,0,0,.35); }
  input:focus, select:focus { outline: 2px solid #16a34a; outline-offset: -1px; }
  .tab-btn.active { background: #16a34a; color: white; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- TOPBAR -->
<header class="bg-white border-b border-slate-200 px-5 h-12 flex items-center justify-between fixed top-0 left-0 right-0 z-40">
  <div class="flex items-center gap-3">
    <span class="font-semibold text-slate-800 flex items-center gap-1.5">
      <i class="ti ti-bolt text-green-600" style="font-size:18px"></i>
      EasyDeploy
    </span>
    <span id="conn-badge" class="text-xs px-2 py-0.5 rounded-full border flex items-center gap-1.5 text-slate-500 border-slate-200">
      <span class="status-dot bg-slate-300" id="conn-dot"></span>
      <span id="conn-url">conectando...</span>
    </span>
  </div>
  <div class="flex items-center gap-2">
    <button onclick="syncAll()" class="text-xs flex items-center gap-1 px-3 py-1.5 border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600">
      <i class="ti ti-refresh" id="sync-icon"></i> Sincronizar
    </button>
    <button onclick="openModal('modal-create')" class="text-xs flex items-center gap-1 px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg">
      <i class="ti ti-plus"></i> Novo serviço
    </button>
  </div>
</header>

<!-- LAYOUT -->
<div class="flex pt-12 min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-52 bg-white border-r border-slate-200 fixed top-12 bottom-0 left-0 z-30 flex flex-col py-2">
    <div class="px-3 pt-2 pb-1 text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Painel</div>
    <button class="sidebar-item active flex items-center gap-2.5 px-4 py-2 text-sm font-medium w-full text-left border-l-2" onclick="showView('services')">
      <i class="ti ti-layout-grid text-base"></i> Serviços
      <span id="svc-count" class="ml-auto text-xs bg-green-100 text-green-700 rounded-full px-2 py-0.5">0</span>
    </button>
    <button class="sidebar-item flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 w-full text-left border-l-2 border-transparent" onclick="showView('logs')">
      <i class="ti ti-list text-base"></i> Log de ações
      <span id="log-count" class="ml-auto text-xs bg-slate-100 text-slate-500 rounded-full px-2 py-0.5">0</span>
    </button>

    <div class="px-3 pt-4 pb-1 text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Filtrar</div>
    <button class="sidebar-item flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 w-full text-left border-l-2 border-transparent" onclick="filterStatus('all')">
      <i class="ti ti-apps text-base"></i> Todos
    </button>
    <button class="sidebar-item flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 w-full text-left border-l-2 border-transparent" onclick="filterStatus('running')">
      <i class="ti ti-player-play text-base text-green-600"></i> Rodando
    </button>
    <button class="sidebar-item flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 w-full text-left border-l-2 border-transparent" onclick="filterStatus('stopped')">
      <i class="ti ti-player-pause text-base text-amber-500"></i> Parados
    </button>
    <button class="sidebar-item flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 w-full text-left border-l-2 border-transparent" onclick="filterStatus('error')">
      <i class="ti ti-alert-triangle text-base text-red-500"></i> Com erro
    </button>
  </aside>

  <!-- MAIN -->
  <main class="ml-52 flex-1 p-6">

    <!-- VIEW: SERVICES -->
    <div id="view-services">
      <!-- STATS -->
      <div class="grid grid-cols-4 gap-3 mb-5">
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <div class="text-xs text-slate-500 mb-1">Total de serviços</div>
          <div class="text-2xl font-medium" id="stat-total">—</div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <div class="text-xs text-slate-500 mb-1">Rodando</div>
          <div class="text-2xl font-medium text-green-600" id="stat-running">—</div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <div class="text-xs text-slate-500 mb-1">Parados</div>
          <div class="text-2xl font-medium text-amber-500" id="stat-stopped">—</div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <div class="text-xs text-slate-500 mb-1">Com erro</div>
          <div class="text-2xl font-medium text-red-500" id="stat-error">—</div>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="flex items-center gap-2 mb-4">
        <div class="relative flex-1 max-w-xs">
          <i class="ti ti-search absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input id="search-input" oninput="renderServices()" type="text" placeholder="Buscar serviço..." class="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-white">
        </div>
        <span class="text-xs text-slate-400" id="filter-label">todos os serviços</span>
      </div>

      <!-- SERVICES LIST -->
      <div id="services-list" class="flex flex-col gap-2">
        <div class="text-sm text-slate-400 py-8 text-center">Carregando serviços...</div>
      </div>
    </div>

    <!-- VIEW: LOGS -->
    <div id="view-logs" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <div class="text-base font-medium">Log de ações</div>
        <button onclick="loadLogs()" class="text-xs flex items-center gap-1 px-3 py-1.5 border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600">
          <i class="ti ti-refresh"></i> Atualizar
        </button>
      </div>
      <div id="log-list" class="flex flex-col gap-1.5">
        <div class="text-sm text-slate-400 py-8 text-center">Nenhuma ação registrada.</div>
      </div>
    </div>

  </main>
</div>

<!-- MODAL: CRIAR SERVIÇO -->
<div id="modal-create" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg shadow-xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <div class="font-medium text-slate-800">Novo serviço</div>
      <button onclick="closeModal('modal-create')" class="text-slate-400 hover:text-slate-600"><i class="ti ti-x text-lg"></i></button>
    </div>
    <div class="px-6 py-5">
      <!-- SOURCE TABS -->
      <div class="flex gap-0 border border-slate-200 rounded-lg overflow-hidden mb-5 w-fit">
        <button id="tab-github" class="tab-btn active text-xs px-4 py-1.5 font-medium transition-all" onclick="setSourceTab('github')">
          <i class="ti ti-brand-github mr-1"></i>GitHub
        </button>
        <button id="tab-image" class="tab-btn text-xs px-4 py-1.5 font-medium text-slate-500 transition-all" onclick="setSourceTab('image')">
          <i class="ti ti-brand-docker mr-1"></i>Imagem Docker
        </button>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
          <label class="text-xs text-slate-500 font-medium block mb-1">Projeto *</label>
          <input id="c-project" type="text" placeholder="marketing" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
        </div>
        <div>
          <label class="text-xs text-slate-500 font-medium block mb-1">Nome do serviço *</label>
          <input id="c-name" type="text" placeholder="lp-produto-x" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
        </div>
      </div>

      <!-- GITHUB FIELDS -->
      <div id="fields-github">
        <div class="grid grid-cols-3 gap-3 mb-3">
          <div>
            <label class="text-xs text-slate-500 font-medium block mb-1">Owner (usuário/org) *</label>
            <input id="c-owner" type="text" placeholder="seuperfil" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
          </div>
          <div>
            <label class="text-xs text-slate-500 font-medium block mb-1">Repositório *</label>
            <input id="c-repo" type="text" placeholder="lp-produto-x" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
          </div>
          <div>
            <label class="text-xs text-slate-500 font-medium block mb-1">Branch</label>
            <input id="c-branch" type="text" placeholder="main" value="main" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
          </div>
        </div>
      </div>

      <!-- DOCKER FIELDS -->
      <div id="fields-image" class="hidden mb-3">
        <label class="text-xs text-slate-500 font-medium block mb-1">Imagem Docker *</label>
        <input id="c-image" type="text" placeholder="nginx:alpine" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
      </div>

      <div class="grid grid-cols-2 gap-3 mb-1">
        <div>
          <label class="text-xs text-slate-500 font-medium block mb-1">Domínio (opcional)</label>
          <input id="c-domain" type="text" placeholder="meusite.com.br" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
        </div>
        <div>
          <label class="text-xs text-slate-500 font-medium block mb-1">Porta</label>
          <input id="c-port" type="number" placeholder="80" value="80" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
        </div>
      </div>
      <p class="text-xs text-slate-400 mb-4">O domínio precisa estar apontado para o servidor antes.</p>

      <div id="create-error" class="hidden text-xs text-red-600 bg-red-50 px-3 py-2 rounded-lg mb-3"></div>

      <div class="flex justify-end gap-2 pt-1">
        <button onclick="closeModal('modal-create')" class="text-sm px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600">Cancelar</button>
        <button onclick="createService()" id="btn-create" class="text-sm px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg flex items-center gap-1.5">
          <i class="ti ti-rocket"></i> Criar e fazer deploy
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: ADICIONAR DOMÍNIO -->
<div id="modal-domain" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-sm shadow-xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <div class="font-medium text-slate-800">Adicionar domínio</div>
      <button onclick="closeModal('modal-domain')" class="text-slate-400 hover:text-slate-600"><i class="ti ti-x text-lg"></i></button>
    </div>
    <div class="px-6 py-5">
      <input type="hidden" id="d-project">
      <input type="hidden" id="d-service">
      <div class="mb-3">
        <label class="text-xs text-slate-500 font-medium block mb-1">Serviço</label>
        <div id="d-service-label" class="text-sm text-slate-700 font-medium"></div>
      </div>
      <div class="mb-3">
        <label class="text-xs text-slate-500 font-medium block mb-1">Domínio *</label>
        <input id="d-domain" type="text" placeholder="meusite.com.br" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
      </div>
      <div class="mb-4">
        <label class="text-xs text-slate-500 font-medium block mb-1">Porta</label>
        <input id="d-port" type="number" value="80" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg">
      </div>
      <div id="domain-error" class="hidden text-xs text-red-600 bg-red-50 px-3 py-2 rounded-lg mb-3"></div>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal('modal-domain')" class="text-sm px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600">Cancelar</button>
        <button onclick="submitDomain()" id="btn-domain" class="text-sm px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg flex items-center gap-1.5">
          <i class="ti ti-world-plus"></i> Adicionar
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: CONFIRMAR DELETE -->
<div id="modal-destroy" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-sm shadow-xl">
    <div class="px-6 py-6 text-center">
      <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
        <i class="ti ti-trash text-red-500 text-xl"></i>
      </div>
      <div class="font-medium text-slate-800 mb-1">Deletar serviço?</div>
      <div id="destroy-label" class="text-sm text-slate-500 mb-5"></div>
      <div class="flex gap-2 justify-center">
        <button onclick="closeModal('modal-destroy')" class="text-sm px-5 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600">Cancelar</button>
        <button id="btn-destroy-confirm" class="text-sm px-5 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg">Deletar</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-5 right-5 z-50 text-sm px-4 py-2.5 rounded-xl shadow-lg font-medium flex items-center gap-2 toast"></div>

<script>
let allServices = [];
let currentFilter = 'all';
let currentSourceTab = 'github';

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${r.status}`);
  }
  return r.json();
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.className = `fixed bottom-5 right-5 z-50 text-sm px-4 py-2.5 rounded-xl shadow-lg font-medium flex items-center gap-2 toast`;
  if (type === 'ok') el.classList.add('bg-green-600', 'text-white');
  else if (type === 'error') el.classList.add('bg-red-500', 'text-white');
  else el.classList.add('bg-slate-700', 'text-white');
  el.innerHTML = `<i class="ti ti-${type === 'ok' ? 'check' : type === 'error' ? 'x' : 'info-circle'}"></i> ${msg}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3500);
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function showView(v) {
  document.getElementById('view-services').classList.toggle('hidden', v !== 'services');
  document.getElementById('view-logs').classList.toggle('hidden', v !== 'logs');
  if (v === 'logs') loadLogs();
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.remove('active');
    if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(v)) el.classList.add('active');
  });
}

function setSourceTab(tab) {
  currentSourceTab = tab;
  document.getElementById('fields-github').classList.toggle('hidden', tab !== 'github');
  document.getElementById('fields-image').classList.toggle('hidden', tab !== 'image');
  document.getElementById('tab-github').classList.toggle('active', tab === 'github');
  document.getElementById('tab-image').classList.toggle('active', tab === 'image');
  document.getElementById('tab-github').classList.toggle('text-slate-500', tab !== 'github');
  document.getElementById('tab-image').classList.toggle('text-slate-500', tab !== 'image');
}

function filterStatus(status) {
  currentFilter = status;
  const labels = { all: 'todos os serviços', running: 'rodando', stopped: 'parados', error: 'com erro' };
  document.getElementById('filter-label').textContent = labels[status] || status;
  renderServices();
}

function getStatus(svc) {
  const state = (svc.state || svc.status || '').toLowerCase();
  if (state.includes('running') || state.includes('rodando')) return 'running';
  if (state.includes('error') || state.includes('failed') || state.includes('erro')) return 'error';
  return 'stopped';
}

function statusBadge(status) {
  if (status === 'running') return `<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full bg-green-50 text-green-700 border border-green-200"><span class="status-dot bg-green-500"></span>rodando</span>`;
  if (status === 'error') return `<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full bg-red-50 text-red-600 border border-red-200"><span class="status-dot bg-red-500"></span>erro</span>`;
  return `<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full bg-amber-50 text-amber-600 border border-amber-200"><span class="status-dot bg-amber-400"></span>parado</span>`;
}

function getDomains(svc) {
  const domains = svc.domains || svc.proxy?.domains || [];
  return domains.map(d => d.host || d).filter(Boolean);
}

function getSource(svc) {
  const src = svc.source || svc.app?.source || {};
  if (src.type === 'github') return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 border border-slate-200"><i class="ti ti-brand-github mr-0.5"></i>${src.owner}/${src.repo}</span>`;
  if (src.type === 'image' && src.image) return `<span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 border border-slate-200"><i class="ti ti-brand-docker mr-0.5"></i>${src.image}</span>`;
  return '';
}

function renderServices() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('services-list');
  let svcs = allServices.filter(s => {
    const name = (s.name || '').toLowerCase();
    const proj = (s._project || '').toLowerCase();
    const matchQ = !q || name.includes(q) || proj.includes(q);
    const status = getStatus(s);
    const matchF = currentFilter === 'all' || status === currentFilter;
    return matchQ && matchF;
  });

  if (!svcs.length) {
    list.innerHTML = `<div class="text-sm text-slate-400 py-10 text-center">Nenhum serviço encontrado.</div>`;
    return;
  }

  list.innerHTML = svcs.map(svc => {
    const status = getStatus(svc);
    const domains = getDomains(svc);
    const borderColor = status === 'error' ? 'border-red-200' : 'border-slate-200';
    const domainHtml = domains.length
      ? domains.map(d => `<a href="https://${d}" target="_blank" class="text-[11px] text-slate-400 hover:text-green-600 flex items-center gap-0.5"><i class="ti ti-external-link" style="font-size:11px"></i>${d}</a>`).join('')
      : '';

    return `
    <div class="svc-card bg-white border ${borderColor} rounded-xl px-4 py-3 grid items-center gap-4" style="grid-template-columns: 180px 1fr auto">
      <div class="flex items-center gap-2.5 min-w-0">
        <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center flex-shrink-0">
          <i class="ti ti-world text-slate-400" style="font-size:15px"></i>
        </div>
        <div class="min-w-0">
          <div class="text-sm font-medium truncate">${svc.name || '—'}</div>
          <div class="text-[11px] text-slate-400 truncate">${svc._project || ''}</div>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        ${statusBadge(status)}
        ${getSource(svc)}
        ${domainHtml}
      </div>
      <div class="flex items-center gap-1.5">
        <button onclick="deployService('${svc._project}','${svc.name}')" class="action-btn flex items-center gap-1 text-[11px] px-2.5 py-1.5 rounded-lg bg-green-50 text-green-700 border border-green-200 font-medium hover:bg-green-100">
          <i class="ti ti-rocket" style="font-size:13px"></i> Deploy
        </button>
        <button onclick="openDomainModal('${svc._project}','${svc.name}')" class="action-btn w-7 h-7 rounded-lg border border-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-700" title="Adicionar domínio">
          <i class="ti ti-world-plus" style="font-size:14px"></i>
        </button>
        <button onclick="restartService('${svc._project}','${svc.name}')" class="action-btn w-7 h-7 rounded-lg border border-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-700" title="Reiniciar">
          <i class="ti ti-refresh" style="font-size:14px"></i>
        </button>
        ${status === 'stopped'
          ? `<button onclick="startService('${svc._project}','${svc.name}')" class="action-btn w-7 h-7 rounded-lg border border-slate-200 flex items-center justify-center text-green-500 hover:bg-green-50" title="Iniciar"><i class="ti ti-player-play" style="font-size:14px"></i></button>`
          : `<button onclick="stopService('${svc._project}','${svc.name}')" class="action-btn w-7 h-7 rounded-lg border border-slate-200 flex items-center justify-center text-slate-400 hover:text-amber-500" title="Parar"><i class="ti ti-player-pause" style="font-size:14px"></i></button>`
        }
        <button onclick="confirmDestroy('${svc._project}','${svc.name}')" class="action-btn w-7 h-7 rounded-lg border border-slate-200 flex items-center justify-center text-slate-400 hover:text-red-500 hover:border-red-200 hover:bg-red-50" title="Deletar">
          <i class="ti ti-trash" style="font-size:14px"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

async function syncAll() {
  const icon = document.getElementById('sync-icon');
  icon.classList.add('spin');
  try {
    const data = await api('/api/services');
    allServices = data.data || [];
    updateStats();
    renderServices();
    document.getElementById('svc-count').textContent = allServices.length;
    toast('Serviços sincronizados');
  } catch (e) {
    toast('Erro ao sincronizar: ' + e.message, 'error');
  } finally {
    icon.classList.remove('spin');
  }
}

function updateStats() {
  const total = allServices.length;
  const running = allServices.filter(s => getStatus(s) === 'running').length;
  const stopped = allServices.filter(s => getStatus(s) === 'stopped').length;
  const error = allServices.filter(s => getStatus(s) === 'error').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-running').textContent = running;
  document.getElementById('stat-stopped').textContent = stopped;
  document.getElementById('stat-error').textContent = error;
}

async function deployService(project, name) {
  try {
    await api('/api/deploy', 'POST', { projectName: project, serviceName: name });
    toast(`Deploy iniciado — ${name}`);
    setTimeout(syncAll, 3000);
  } catch (e) {
    toast('Deploy falhou: ' + e.message, 'error');
  }
}

async function restartService(project, name) {
  try {
    await api('/api/restart', 'POST', { projectName: project, serviceName: name });
    toast(`Reiniciando — ${name}`);
    setTimeout(syncAll, 2000);
  } catch (e) {
    toast('Erro ao reiniciar: ' + e.message, 'error');
  }
}

async function stopService(project, name) {
  try {
    await api('/api/stop', 'POST', { projectName: project, serviceName: name });
    toast(`Serviço parado — ${name}`, 'info');
    setTimeout(syncAll, 2000);
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
}

async function startService(project, name) {
  try {
    await api('/api/start', 'POST', { projectName: project, serviceName: name });
    toast(`Iniciando — ${name}`);
    setTimeout(syncAll, 2000);
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
}

function confirmDestroy(project, name) {
  document.getElementById('destroy-label').textContent = `${project}/${name} será removido permanentemente.`;
  document.getElementById('btn-destroy-confirm').onclick = async () => {
    closeModal('modal-destroy');
    try {
      await api('/api/destroy', 'POST', { projectName: project, serviceName: name });
      toast(`Serviço deletado — ${name}`, 'info');
      await syncAll();
    } catch (e) {
      toast('Erro ao deletar: ' + e.message, 'error');
    }
  };
  openModal('modal-destroy');
}

function openDomainModal(project, name) {
  document.getElementById('d-project').value = project;
  document.getElementById('d-service').value = name;
  document.getElementById('d-service-label').textContent = `${project}/${name}`;
  document.getElementById('d-domain').value = '';
  document.getElementById('d-port').value = '80';
  document.getElementById('domain-error').classList.add('hidden');
  openModal('modal-domain');
}

async function submitDomain() {
  const project = document.getElementById('d-project').value;
  const name = document.getElementById('d-service').value;
  const domain = document.getElementById('d-domain').value.trim();
  const port = parseInt(document.getElementById('d-port').value) || 80;
  const errEl = document.getElementById('domain-error');
  if (!domain) { errEl.textContent = 'Informe o domínio.'; errEl.classList.remove('hidden'); return; }
  const btn = document.getElementById('btn-domain');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader spin"></i> Adicionando...';
  try {
    await api('/api/add-domain', 'POST', { projectName: project, serviceName: name, domain, port });
    closeModal('modal-domain');
    toast(`Domínio adicionado — ${domain}`);
    setTimeout(syncAll, 1500);
  } catch (e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-world-plus"></i> Adicionar';
  }
}

async function createService() {
  const project = document.getElementById('c-project').value.trim();
  const name = document.getElementById('c-name').value.trim();
  const domain = document.getElementById('c-domain').value.trim();
  const port = parseInt(document.getElementById('c-port').value) || 80;
  const errEl = document.getElementById('create-error');

  if (!project || !name) { errEl.textContent = 'Preencha projeto e nome do serviço.'; errEl.classList.remove('hidden'); return; }

  const body = { projectName: project, serviceName: name, sourceType: currentSourceTab, domain: domain || null, port };

  if (currentSourceTab === 'github') {
    body.githubOwner = document.getElementById('c-owner').value.trim();
    body.githubRepo = document.getElementById('c-repo').value.trim();
    body.githubBranch = document.getElementById('c-branch').value.trim() || 'main';
    if (!body.githubOwner || !body.githubRepo) { errEl.textContent = 'Informe owner e repositório do GitHub.'; errEl.classList.remove('hidden'); return; }
  } else {
    body.image = document.getElementById('c-image').value.trim();
    if (!body.image) { errEl.textContent = 'Informe a imagem Docker.'; errEl.classList.remove('hidden'); return; }
  }

  errEl.classList.add('hidden');
  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader spin"></i> Criando...';

  try {
    await api('/api/create-service', 'POST', body);
    closeModal('modal-create');
    toast(`Serviço criado e deploy iniciado — ${name}`);
    await syncAll();
  } catch (e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-rocket"></i> Criar e fazer deploy';
  }
}

async function loadLogs() {
  const data = await api('/api/logs');
  const logs = data.data || [];
  document.getElementById('log-count').textContent = logs.length;
  const el = document.getElementById('log-list');
  if (!logs.length) {
    el.innerHTML = `<div class="text-sm text-slate-400 py-8 text-center">Nenhuma ação registrada ainda.</div>`;
    return;
  }
  const icon = { ok: 'check', error: 'alert-triangle', warn: 'player-pause' };
  const color = { ok: 'text-green-600', error: 'text-red-500', warn: 'text-amber-500' };
  el.innerHTML = logs.map(l => `
    <div class="flex items-center gap-2.5 text-sm bg-white border border-slate-100 rounded-lg px-3 py-2">
      <span class="text-xs text-slate-400 w-10 flex-shrink-0">${l.time}</span>
      <i class="ti ti-${icon[l.status] || 'info-circle'} ${color[l.status] || 'text-slate-400'}" style="font-size:14px"></i>
      <span class="font-medium text-slate-700">${l.action}</span>
      <span class="text-slate-400">— ${l.service}</span>
      ${l.detail ? `<span class="ml-auto text-xs text-slate-400">${l.detail}</span>` : ''}
    </div>
  `).join('');
}

async function checkHealth() {
  try {
    const h = await api('/api/health');
    const dot = document.getElementById('conn-dot');
    const url = document.getElementById('conn-url');
    if (h.connected) {
      dot.className = 'status-dot bg-green-500';
      url.textContent = h.panel.replace('https://','').replace('http://','');
    } else {
      dot.className = 'status-dot bg-red-500';
      url.textContent = 'desconectado';
    }
  } catch {
    document.getElementById('conn-dot').className = 'status-dot bg-red-500';
    document.getElementById('conn-url').textContent = 'desconectado';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') {
  ['modal-create','modal-domain','modal-destroy'].forEach(closeModal);
}});

(async () => {
  await checkHealth();
  await syncAll();
  setInterval(syncAll, 60000);
  setInterval(checkHealth, 30000);
})();
</script>
</body>
</html>
